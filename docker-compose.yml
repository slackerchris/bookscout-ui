services:
  # ── DB migrations (runs once, exits) ──────────────────────────────────────
  migrate:
    image: ghcr.io/slackerchris/bookscout:latest
    container_name: bookscout-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookscout:${POSTGRES_PASSWORD:-bookscout}@postgres/bookscout
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - bookscout

  # ── API service ───────────────────────────────────────────────────────────
  bookscout:
    image: ghcr.io/slackerchris/bookscout:latest
    container_name: bookscout
    ports:
      - "8765:8765"
    volumes:
      - bookscout-data:/data
      # Uncomment and adjust if using postprocess.mode: bookscout
      # The path must match POSTPROCESS_LIBRARY_ROOT / postprocess.library_root
      #- /path/to/audiobooks:/audiobooks
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookscout:${POSTGRES_PASSWORD:-bookscout}@postgres/bookscout
      - REDIS_URL=redis://redis:6379
      - BOOKSCOUT_CONFIG=/data/config.yaml
      # Optional env-var overrides (or put these in /data/config.yaml instead)
      - AUDIOBOOKSHELF_URL=${AUDIOBOOKSHELF_URL:-}
      - AUDIOBOOKSHELF_TOKEN=${AUDIOBOOKSHELF_TOKEN:-}
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - JACKETT_URL=${JACKETT_URL:-}
      - JACKETT_API_KEY=${JACKETT_API_KEY:-}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
      - ISBNDB_API_KEY=${ISBNDB_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Download client
      - DOWNLOAD_PREFERRED=${DOWNLOAD_PREFERRED:-}
      - SABNZBD_URL=${SABNZBD_URL:-}
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:-}
      - SABNZBD_CATEGORY=${SABNZBD_CATEGORY:-}
      - TORRENT_URL=${TORRENT_URL:-}
      - TORRENT_USERNAME=${TORRENT_USERNAME:-}
      - TORRENT_PASSWORD=${TORRENT_PASSWORD:-}
      - TORRENT_CATEGORY=${TORRENT_CATEGORY:-}
      - TORRENT_SAVE_PATH=${TORRENT_SAVE_PATH:-}
      # Post-processing
      - POSTPROCESS_MODE=${POSTPROCESS_MODE:-client}
      - POSTPROCESS_LIBRARY_ROOT=${POSTPROCESS_LIBRARY_ROOT:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bookscout

  # ── Background worker (arq) ───────────────────────────────────────────────
  worker:
    image: ghcr.io/slackerchris/bookscout:latest
    container_name: bookscout-worker
    command: ["arq", "workers.settings.WorkerSettings"]
    volumes:
      - bookscout-data:/data
      # Uncomment and adjust if using postprocess.mode: bookscout
      #- /path/to/audiobooks:/audiobooks
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookscout:${POSTGRES_PASSWORD:-bookscout}@postgres/bookscout
      - REDIS_URL=redis://redis:6379
      - BOOKSCOUT_CONFIG=/data/config.yaml
      - AUDIOBOOKSHELF_URL=${AUDIOBOOKSHELF_URL:-}
      - AUDIOBOOKSHELF_TOKEN=${AUDIOBOOKSHELF_TOKEN:-}
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - JACKETT_URL=${JACKETT_URL:-}
      - JACKETT_API_KEY=${JACKETT_API_KEY:-}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
      - ISBNDB_API_KEY=${ISBNDB_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DOWNLOAD_PREFERRED=${DOWNLOAD_PREFERRED:-}
      - SABNZBD_URL=${SABNZBD_URL:-}
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:-}
      - SABNZBD_CATEGORY=${SABNZBD_CATEGORY:-}
      - TORRENT_URL=${TORRENT_URL:-}
      - TORRENT_USERNAME=${TORRENT_USERNAME:-}
      - TORRENT_PASSWORD=${TORRENT_PASSWORD:-}
      - TORRENT_CATEGORY=${TORRENT_CATEGORY:-}
      - TORRENT_SAVE_PATH=${TORRENT_SAVE_PATH:-}
      - POSTPROCESS_MODE=${POSTPROCESS_MODE:-client}
      - POSTPROCESS_LIBRARY_ROOT=${POSTPROCESS_LIBRARY_ROOT:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bookscout

  postgres:
    image: postgres:16-alpine
    container_name: bookscout-postgres
    environment:
      POSTGRES_DB: bookscout
      POSTGRES_USER: bookscout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookscout}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookscout"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bookscout

  redis:
    image: redis:7-alpine
    container_name: bookscout-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bookscout

  # ── UI ────────────────────────────────────────────────────────────────────
  bookscout-ui:
    image: ghcr.io/slackerchris/bookscout-ui:1.2.4
    container_name: bookscout-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - bookscout

networks:
  bookscout:
    driver: bridge

volumes:
  bookscout-data:
  postgres-data:
  redis-data:
