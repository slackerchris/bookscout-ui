server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver; re-resolve upstream every 10 s so
    # nginx picks up the new container IP after a bookscout restart without
    # requiring a reload of the UI container.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy BookScout API — avoids CORS, hides internal service URL
    # $request_uri passes the full original URI (path + query string) so nginx
    # does not mangle the path when proxy_pass contains a variable.
    location /api/ {
        set $upstream http://bookscout:8765;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE: disable buffering so events stream through immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /health {
        set $upstream http://bookscout:8765;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
