server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy BookScout API — avoids CORS, hides internal service URL
    location /api/ {
        proxy_pass http://bookscout:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE: disable buffering so events stream through immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://bookscout:8765/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
